# Pre-commit hooks: https://pre-commit.com
# Install once with `pre-commit install`; run on demand with
# `pre-commit run --all-files`. Optional but recommended for contributors,
# since the project has no CI.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright (strict)
        entry: basedpyright sparcli examples
        language: system
        types: [python]
        pass_filenames: false
